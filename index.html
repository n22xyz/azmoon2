<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سامانه جامع و هوشمند آزمون‌های آنلاین</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #f0fdf4 0%, #e6f4ea 100%);
            font-family: 'Tahoma', 'Segoe UI', sans-serif;
            padding: 30px 20px;
            direction: rtl;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 30px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            padding: 35px;
            transition: max-width 0.4s ease;
        }
        .main-header { text-align: center; color: #15803d; margin-bottom: 25px; font-size: 1.6rem; font-weight: bold; }
        
        /* استایل تب‌های سوییچ کننده بالای سایت */
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; background: #f1f5f9; padding: 6px; border-radius: 40px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 30px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.3s; color: #475569; background: transparent; }
        .tab-btn.active { background: #ffffff; color: #16a34a; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        .panel { display: none; }
        .panel.active { display: block; animation: fadeIn 0.3s ease-in-out; }

        label { display: block; margin-top: 15px; margin-bottom: 5px; font-weight: bold; color: #1e293b; font-size: 0.9rem; }
        select, input, button { width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 25px; font-size: 0.95rem; outline: none; transition: 0.2s; }
        select:focus, input:focus { border-color: #16a34a; box-shadow: 0 0 0 3px rgba(22,163,74,0.15); }
        
        .btn-green { background: linear-gradient(95deg, #16a34a, #15803d); border: none; color: white; font-weight: bold; margin-top: 25px; cursor: pointer; box-shadow: 0 5px 12px rgba(22,163,74,0.2); }
        .btn-green:hover { transform: scale(1.01); background: linear-gradient(95deg, #15803d, #166534); }
        
        .btn-orange { background: linear-gradient(95deg, #ff8c42, #ff6a2e); border: none; color: white; font-weight: bold; margin-top: 25px; cursor: pointer; box-shadow: 0 5px 12px rgba(255,108,46,0.3); }
        .btn-orange:hover { transform: scale(1.01); background: linear-gradient(95deg, #ff7a2e, #ff571a); }

        /* استایل اختصاصی نوار پیشرفت لود حجمی کارنامه */
        .progress-container {
            width: 100%;
            background-color: #e2e8f0;
            border-radius: 20px;
            margin-top: 20px;
            display: none;
            overflow: hidden;
            position: relative;
            height: 24px;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(95deg, #22c55e, #16a34a);
            border-radius: 20px;
            transition: width 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .progress-text {
            position: absolute;
            width: 100%;
            text-align: center;
            font-size: 0.85rem;
            font-weight: bold;
            color: #1e293b;
            line-height: 24px;
        }

        /* آی‌فریم برای لود کارنامه و پاسخبرگ‌ها */
        #displayFrame { width: 100%; height: 850px; border: 2px solid #e2e8f0; margin-top: 30px; display: none; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        .footer { text-align: center; margin-top: 25px; font-size: 0.8rem; color: #64748b; border-top: 1px dashed #e2e8f0; padding-top: 15px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div class="main-header">🏛️ سامانه هوشمند و جامع آزمون آنلاین</div>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('reportPanel', this)">📊 دریافت کارنامه آنلاین</button>
        <button class="tab-btn" onclick="switchTab('formPanel', this)">📝 ورود به پاسخبرگ آزمون</button>
    </div>

    <div id="reportPanel" class="panel active">
        <label>🗓️ انتخاب تاریخ آزمون</label>
        <select id="dateSelect" onchange="onDateChange()">
            <option value="">تاریخ آزمون را انتخاب کنید</option>
        </select>

        <label>🏛️ انتخاب موسسه</label>
        <select id="instSelect" onchange="onInstChange()" disabled>
            <option value="">موسسه را انتخاب کنید</option>
        </select>

        <label>🧪 انتخاب عنوان آزمون</label>
        <select id="examSelect" onchange="onExamChange()" disabled>
            <option value="">عنوان آزمون را انتخاب کنید</option>
        </select>

        <label>🎓 انتخاب سطح / کد گروه</label>
        <select id="levelSelect" onchange="onLevelChange()" disabled>
            <option value="">سطح / کد گروه را انتخاب کنید</option>
        </select>

        <label>👤 نام و نام خانوادگی داوطلب</label>
        <input type="text" id="studentSelect" list="studentOptions" placeholder="سطح را انتخاب کنید" disabled>
        <datalist id="studentOptions"></datalist>

        <label>🔐 رمز عبور شخصی</label>
        <input type="password" id="studentPassword" placeholder="رمز عبور شخصی صادر شده در پاسخبرگ">

        <button class="btn-green" id="submitBtn" onclick="fetchAndUnlockReport()">🔍 مشاهده و دریافت کارنامه</button>
        
        <div class="progress-container" id="progressBarContainer">
            <div class="progress-bar" id="progressBar"></div>
            <div class="progress-text" id="progressText">۰%</div>
        </div>
    </div>

    <div id="formPanel" class="panel">
        <label>🗓️ انتخاب تاریخ پاسخبرگ</label>
        <select id="fDateSelect" onchange="onFormDateChange()">
            <option value="">تاریخ پاسخبرگ را انتخاب کنید</option>
        </select>

        <label>🏛️ انتخاب موسسه</label>
        <select id="fInstSelect" onchange="onFormInstChange()" disabled>
            <option value="">موسسه را انتخاب کنید</option>
        </select>

        <label>🧪 انتخاب عنوان پاسخبرگ</label>
        <select id="fExamSelect" disabled>
            <option value="">عنوان پاسخبرگ را انتخاب کنید</option>
        </select>

        <button class="btn-orange" onclick="loadExternalPasokhbarg()">📝 باز کردن و شروع پاسخگویی</button>
    </div>

    <div class="footer">✨ طراحی شده توسط نیما پیام - کلیه حقوق محفوظ است ✨</div>
</div>

<iframe id="displayFrame"></iframe>

<script>
    const CLOUD_BASE_URL = "./"; 
    let reportsDB = {};
    let formsDB = {};
    let currentLevelStudents = [];

    async function initSystem() {
        try {
            const res = await fetch(CLOUD_BASE_URL + 'reports_list.json');
            if (res.ok) {
                reportsDB = await res.json();
                populateDateSelect(reportsDB, 'dateSelect');
            }
        } catch(e) { console.log("در انتظار دیتابیس کارنامه‌ها..."); }

        try {
            const res = await fetch(CLOUD_BASE_URL + 'forms_list.json');
            if (res.ok) {
                formsDB = await res.json();
                populateDateSelect(formsDB, 'fDateSelect');
            }
        } catch(e) { console.log("در انتظار دیتابیس پاسخبرگ‌ها..."); }
    }

    function populateDateSelect(db, selectId) {
        const select = document.getElementById(selectId);
        Object.keys(db).sort().forEach(date => {
            let option = document.createElement('option');
            option.value = date; 
            option.textContent = date.replace(/_/g, '.');
            select.appendChild(option);
        });
    }

    function switchTab(panelId, btn) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(panelId).classList.add('active');
        btn.classList.add('active');
        
        document.getElementById('displayFrame').style.display = "none";
        document.getElementById('mainContainer').style.maxWidth = "650px";
    }

    // ================= منطق انتخاب و لود پاسخبرگ‌های فیزیکی =================
    function onFormDateChange() {
        const date = document.getElementById('fDateSelect').value;
        resetSelects(['fInstSelect', 'fExamSelect']);
        if (!date || !formsDB[date]) return;
        const select = document.getElementById('fInstSelect');
        select.disabled = false;
        Object.keys(formsDB[date]).sort().forEach(inst => {
            let option = document.createElement('option');
            option.value = inst; option.textContent = inst.replace(/_/g, ' ');
            select.appendChild(option);
        });
    }

    function onFormInstChange() {
        const date = document.getElementById('fDateSelect').value;
        const inst = document.getElementById('fInstSelect').value;
        resetSelects(['fExamSelect']);
        if (!inst || !formsDB[date][inst]) return;
        const select = document.getElementById('fExamSelect');
        select.disabled = false;
        Object.keys(formsDB[date][inst]).sort().forEach(exam => {
            let option = document.createElement('option');
            option.value = formsDB[date][inst][exam]; 
            option.textContent = exam.replace(/_/g, ' ');
            select.appendChild(option);
        });
    }

    async function loadExternalPasokhbarg() {
        const htmlRelativePath = document.getElementById('fExamSelect').value;
        const frame = document.getElementById('displayFrame');
        const container = document.getElementById('mainContainer');
        if (!htmlRelativePath) return;

        try {
            const response = await fetch(CLOUD_BASE_URL + htmlRelativePath);
            if (!response.ok) throw new Error();
            const htmlContent = await response.text();
            container.style.maxWidth = "1000px";
            frame.style.display = "block";
            const doc = frame.contentWindow.document;
            doc.open(); doc.write(htmlContent); doc.close();
            frame.scrollIntoView({ behavior: 'smooth' });
        } catch (error) { alert("خطا در بارگذاری فایل پاسخبرگ"); }
    }

    // ================= منطق انتخاب زنجیره‌ای کارنامه‌ها =================
    function onDateChange() {
        const date = document.getElementById('dateSelect').value;
        resetSelects(['instSelect', 'examSelect', 'levelSelect', 'studentSelect']);
        if (!date || !reportsDB[date]) return;
        const select = document.getElementById('instSelect'); select.disabled = false;
        Object.keys(reportsDB[date]).sort().forEach(inst => {
            let option = document.createElement('option'); option.value = inst; option.textContent = inst; select.appendChild(option);
        });
    }

    function onInstChange() {
        const date = document.getElementById('dateSelect').value;
        const inst = document.getElementById('instSelect').value;
        resetSelects(['examSelect', 'levelSelect', 'studentSelect']);
        if (!inst || !reportsDB[date][inst]) return;
        const select = document.getElementById('examSelect'); select.disabled = false;
        Object.keys(reportsDB[date][inst]).sort().forEach(exam => {
            let option = document.createElement('option'); option.value = exam; option.textContent = exam; select.appendChild(option);
        });
    }

    function onExamChange() {
        const date = document.getElementById('dateSelect').value;
        const inst = document.getElementById('instSelect').value;
        const exam = document.getElementById('examSelect').value;
        resetSelects(['levelSelect', 'studentSelect']);
        if (!exam || !reportsDB[date][inst][exam]) return;
        const select = document.getElementById('levelSelect'); select.disabled = false;
        Object.keys(reportsDB[date][inst][exam]).sort().forEach(lvl => {
            let option = document.createElement('option'); option.value = lvl; option.textContent = lvl; select.appendChild(option);
        });
    }

    function onLevelChange() {
        const date = document.getElementById('dateSelect').value;
        const inst = document.getElementById('instSelect').value;
        const exam = document.getElementById('examSelect').value;
        const lvl = document.getElementById('levelSelect').value;
        
        const inputField = document.getElementById('studentSelect');
        const dataList = document.getElementById('studentOptions');
        
        inputField.value = ""; dataList.innerHTML = "";
        inputField.disabled = true; currentLevelStudents = [];

        if (!lvl || !reportsDB[date][inst][exam][lvl]) return;
        
        inputField.disabled = false;
        inputField.placeholder = "نام خود را تایپ یا انتخاب کنید...";
        
        currentLevelStudents = [...reportsDB[date][inst][exam][lvl]];
        currentLevelStudents.sort((a, b) => a.name.localeCompare(b.name, 'fa'));
        
        currentLevelStudents.forEach(stu => {
            let option = document.createElement('option');
            option.value = stu.name;
            dataList.appendChild(option);
        });
    }

    function resetSelects(ids) {
        ids.forEach(id => {
            const select = document.getElementById(id);
            let defaultText = "انتخاب کنید...";
            if (id === 'instSelect') defaultText = "تاریخ را انتخاب کنید";
            else if (id === 'examSelect') defaultText = "موسسه را انتخاب کنید";
            else if (id === 'levelSelect') defaultText = "آزمون را انتخاب کنید";
            
            if (id === 'studentSelect') {
                select.value = ""; select.placeholder = "سطح را انتخاب کنید"; select.disabled = true;
                document.getElementById('studentOptions').innerHTML = ""; currentLevelStudents = [];
            } else {
                select.innerHTML = `<option value="">${defaultText}</option>`; select.disabled = true;
            }
        });
    }

    // ================= دانلود حجمی با نوار پیشرفت و آنزیپ باینری انحصاری پکیج‌های pyzipper =================
    function fetchAndUnlockReport() {
        const studentName = document.getElementById('studentSelect').value.trim();
        const password = document.getElementById('studentPassword').value.trim();
        const frame = document.getElementById('displayFrame');
        const container = document.getElementById('mainContainer');
        const submitBtn = document.getElementById('submitBtn');
        
        // المان‌های کنترل نوار پیشرفت لود
        const progressContainer = document.getElementById('progressBarContainer');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');

        if (!studentName) { alert("لطفاً نام دانش‌آموز را انتخاب یا تایپ کنید."); return; }
        if (!password) { alert("لطفاً رمز عبور شخصی خود را وارد کنید."); return; }

        const targetStudent = currentLevelStudents.find(stu => stu.name === studentName);
        if (!targetStudent) { alert("❌ نام داوطلب یافت نشد."); return; }

        // غیرفعال کردن دکمه و ریست کردن نوار پیشرفت لود
        submitBtn.disabled = true;
        progressContainer.style.display = "block";
        progressBar.style.width = "0%";
        progressText.textContent = "در حال اتصال... ۰%";
        frame.style.display = "none";

        // استفاده از XMLHttpRequest برای مانیتور کردن حجم دانلود بایت به بایت
        const xhr = new XMLHttpRequest();
        xhr.open('GET', CLOUD_BASE_URL + targetStudent.file_name, true);
        xhr.responseType = 'arraybuffer';

        // تابع مانیتور لود لحظه‌ای حجم فایل (Progress Event)
        xhr.onprogress = function(e) {
            if (e.lengthComputable) {
                const percentComplete = Math.round((e.loaded / e.total) * 100);
                progressBar.style.width = percentComplete + "%";
                progressText.textContent = "در حال بارگذاری کارنامه... " + percentComplete + "%";
            }
        };

        xhr.onload = async function() {
            submitBtn.disabled = false;
            if (this.status === 200) {
                progressText.textContent = "در حال رمزگشایی نهایی کارنامه...";
                const arrayBuffer = this.response;

                try {
                    // سازگاری کامل کلاینت با امضای باینری زیپ‌های قفل شده لوکال پایتون شما
                    const zip = await JSZip.loadAsync(arrayBuffer);
                    let indexFile = zip.file("index.html");
                    if (!indexFile) {
                        const files = Object.keys(zip.files);
                        const htmlKey = files.find(f => f.endsWith('index.html'));
                        if (htmlKey) indexFile = zip.file(htmlKey);
                    }
                    
                    const htmlContent = await indexFile.async("string");

                    // مخفی کردن نوار پیشرفت پس از لود کامل و رندر در آی‌فریم کلاینت
                    progressContainer.style.display = "none";
                    container.style.maxWidth = "1000px";
                    frame.style.display = "block";
                    const doc = frame.contentWindow.document;
                    doc.open(); doc.write(htmlContent); doc.close();
                    frame.scrollIntoView({ behavior: 'smooth' });
                    
                } catch (error) {
                    alert("🔒 خطا در بارگذاری کارنامه! لطفاً از صحت اطلاعات مطمئن شوید.");
                    progressContainer.style.display = "none";
                    container.style.maxWidth = "650px";
                }
            } else {
                alert("❌ خطا در دانلود فایل کارنامه از کلاود.");
                progressContainer.style.display = "none";
                container.style.maxWidth = "650px";
            }
        };

        xhr.onerror = function() {
            submitBtn.disabled = false;
            alert("❌ خطای شبکه در ارتباط با سرور کلاود گیت‌هاب.");
            progressContainer.style.display = "none";
            container.style.maxWidth = "650px";
        };

        xhr.send();
    }

    window.onload = initSystem;
</script>
</body>
</html>
