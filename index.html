<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سامانه جامع و هوشمند آزمون‌های آنلاین</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #f0fdf4 0%, #e6f4ea 100%);
            font-family: 'Tahoma', 'Segoe UI', sans-serif;
            padding: 30px 20px;
            direction: rtl;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 30px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            padding: 35px;
            transition: max-width 0.4s ease;
        }
        .main-header { text-align: center; color: #15803d; margin-bottom: 25px; font-size: 1.6rem; font-weight: bold; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; background: #f1f5f9; padding: 6px; border-radius: 40px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 30px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.3s; color: #475569; background: transparent; }
        .tab-btn.active { background: #ffffff; color: #16a34a; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        .panel { display: none; }
        .panel.active { display: block; animation: fadeIn 0.3s ease-in-out; }

        label { display: block; margin-top: 15px; margin-bottom: 5px; font-weight: bold; color: #1e293b; font-size: 0.9rem; }
        select, input, button { width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 25px; font-size: 0.95rem; outline: none; transition: 0.2s; }
        select:focus, input:focus { border-color: #16a34a; box-shadow: 0 0 0 3px rgba(22,163,74,0.15); }
        
        .btn-green { background: linear-gradient(95deg, #16a34a, #15803d); border: none; color: white; font-weight: bold; margin-top: 25px; cursor: pointer; box-shadow: 0 5px 12px rgba(22,163,74,0.2); }
        .btn-green:hover { transform: scale(1.01); background: linear-gradient(95deg, #15803d, #166534); }
        
        .btn-orange { background: linear-gradient(95deg, #ff8c42, #ff6a2e); border: none; color: white; font-weight: bold; margin-top: 25px; cursor: pointer; box-shadow: 0 5px 12px rgba(255,108,46,0.3); }
        .btn-orange:hover { transform: scale(1.01); background: linear-gradient(95deg, #ff7a2e, #ff571a); }

        .progress-container { width: 100%; background-color: #e2e8f0; border-radius: 20px; margin-top: 20px; display: none; overflow: hidden; position: relative; height: 24px; }
        .progress-bar { height: 100%; width: 0%; background: linear-gradient(95deg, #22c55e, #16a34a); border-radius: 20px; transition: width 0.1s ease; }
        .progress-text { position: absolute; width: 100%; text-align: center; font-size: 0.85rem; font-weight: bold; color: #1e293b; line-height: 24px; }

        #displayFrame { width: 100%; height: 950px; border: 2px solid #e2e8f0; margin-top: 30px; display: none; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .footer { text-align: center; margin-top: 25px; font-size: 0.8rem; color: #64748b; border-top: 1px dashed #e2e8f0; padding-top: 15px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div class="main-header">🏛️ سامانه هوشمند و جامع آزمون آنلاین</div>
    
    <div class="tabs">
        <button class="tab-btn active" id="t1" onclick="switchTab('reportPanel', this)">📊 دریافت کارنامه آنلاین</button>
        <button class="tab-btn" id="t2" onclick="switchTab('formPanel', this)">📝 ورود به پاسخبرگ آزمون</button>
    </div>

    <div id="reportPanel" class="panel active">
        <label>🗓️ انتخاب تاریخ آزمون</label>
        <select id="dateSelect" onchange="onDateChange()"><option value="">تاریخ آزمون را انتخاب کنید</option></select>
        <label>🏛️ انتخاب موسسه</label>
        <select id="instSelect" onchange="onInstChange()" disabled><option value="">موسسه را انتخاب کنید</option></select>
        <label>🧪 انتخاب عنوان آزمون</label>
        <select id="examSelect" onchange="onExamChange()" disabled><option value="">عنوان آزمون را انتخاب کنید</option></select>
        <label>🎓 انتخاب سطح / کد گروه</label>
        <select id="levelSelect" onchange="onLevelChange()" disabled><option value="">سطح را انتخاب کنید</option></select>
        <label>👤 نام و نام خانوادگی داوطلب</label>
        <input type="text" id="studentSelect" list="studentOptions" placeholder="سطح را انتخاب کنید" disabled>
        <datalist id="studentOptions"></datalist>
        <label>🔐 رمز عبور شخصی</label>
        <input type="password" id="studentPassword" placeholder="رمز عبور شخصی داوطلب">
        <button class="btn-green" id="submitBtn" onclick="verifyAndFetch()">🔍 مشاهده و دریافت کارنامه</button>
        
        <div class="progress-container" id="progressBarContainer">
            <div class="progress-bar" id="progressBar"></div>
            <div class="progress-text" id="progressText">۰%</div>
        </div>
    </div>

    <div id="formPanel" class="panel">
        <label>📝 انتخاب آزمون / پاسخبرگ فعال</label>
        <select id="flatFormSelect">
            <option value="">در حال بارگذاری فرم‌ها از سرور...</option>
        </select>
        <button class="btn-orange" onclick="loadExternalPasokhbarg()">📝 باز کردن و شروع پاسخگویی</button>
    </div>

    <div class="footer">✨ طراحی شده توسط نیما پیام - کلیه حقوق محفوظ است ✨</div>
</div>

<iframe id="displayFrame"></iframe>

<script>
    const CLOUD_BASE_URL = "./"; 
    let reportsDB = {}; let formsDB = {}; let currentLevelStudents = [];

    async function initSystem() {
        try {
            const res = await fetch(CLOUD_BASE_URL + 'reports_list.json');
            if (res.ok) { reportsDB = await res.json(); populateDateSelect(reportsDB, 'dateSelect'); }
        } catch(e) {}
        try {
            const res = await fetch(CLOUD_BASE_URL + 'forms_list.json');
            if (res.ok) { formsDB = await res.json(); parseFlatForms(formsDB); }
        } catch(e) {
            document.getElementById('flatFormSelect').innerHTML = '<option value="">هیچ پاسخبرگ فعالی روی سرور نیست</option>';
        }
    }

    // لود داینامیک و منعطف لیست پاسخبرگ‌ها بدون باگ لایه‌ها
    function parseFlatForms(db) {
        const select = document.getElementById('flatFormSelect');
        select.innerHTML = '<option value="">پاسخبرگ آزمون خود را انتخاب کنید</option>';
        
        // پیمایش منعطف ساختارهای تک‌لایه یا چندلایه پایتون شما
        if (Array.isArray(db)) {
            db.forEach(item => { addFormOption(select, item.title || item.name, item.path || item.file_name); });
        } else {
            Object.keys(db).forEach(key1 => {
                if (typeof db[key1] === 'string') { addFormOption(select, key1, db[key1]); }
                else {
                    Object.keys(db[key1]).forEach(key2 => {
                        if (typeof db[key1][key2] === 'string') { addFormOption(select, `${key1} - ${key2}`, db[key1][key2]); }
                        else {
                            Object.keys(db[key1][key2]).forEach(key3 => {
                                addFormOption(select, `${key1} | ${key2} | ${key3}`, db[key1][key2][key3]);
                            });
                        }
                    });
                }
            });
        }
    }

    function addFormOption(select, text, value) {
        let opt = document.createElement('option');
        opt.value = value; opt.textContent = text.replace(/_/g, ' ');
        select.appendChild(opt);
    }

    async function hashPassword(string) {
        const utf8 = new TextEncoder().encode(string);
        const hashBuffer = await crypto.subtle.digest('SHA-256', utf8);
        return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function populateDateSelect(db, selectId) {
        const select = document.getElementById(selectId);
        select.innerHTML = '<option value="">انتخاب کنید...</option>';
        Object.keys(db).sort().forEach(date => {
            let option = document.createElement('option'); option.value = date; option.textContent = date.replace(/_/g, '.'); select.appendChild(option);
        });
    }

    function switchTab(panelId, btn) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(panelId).classList.add('active'); btn.classList.add('active');
        document.getElementById('displayFrame').style.display = "none";
        document.getElementById('mainContainer').style.maxWidth = "650px";
    }

    async function loadExternalPasokhbarg() {
        const path = document.getElementById('flatFormSelect').value;
        const frame = document.getElementById('displayFrame'); const container = document.getElementById('mainContainer');
        if (!path) { alert("لطفاً یک پاسخبرگ انتخاب کنید."); return; }
        try {
            const response = await fetch(CLOUD_BASE_URL + path); if (!response.ok) throw new Error();
            const htmlContent = await response.text(); container.style.maxWidth = "1000px"; frame.style.display = "block";
            const doc = frame.contentWindow.document; doc.open(); doc.write(htmlContent); doc.close();
            frame.scrollIntoView({ behavior: 'smooth' });
        } catch (error) { alert("خطا در بارگذاری فایل پاسخبرگ خام"); }
    }

    function onDateChange() {
        const date = document.getElementById('dateSelect').value; resetSelects(['instSelect', 'examSelect', 'levelSelect', 'studentSelect']);
        if (!date || !reportsDB[date]) return;
        const select = document.getElementById('instSelect'); select.disabled = false;
        Object.keys(reportsDB[date]).sort().forEach(inst => {
            let option = document.createElement('option'); option.value = inst; option.textContent = inst; select.appendChild(option);
        });
    }

    function onInstChange() {
        const date = document.getElementById('dateSelect').value; const inst = document.getElementById('instSelect').value; resetSelects(['examSelect', 'levelSelect', 'studentSelect']);
        if (!inst || !reportsDB[date][inst]) return;
        const select = document.getElementById('examSelect'); select.disabled = false;
        Object.keys(reportsDB[date][inst]).sort().forEach(exam => {
            let option = document.createElement('option'); option.value = exam; option.textContent = exam; select.appendChild(option);
        });
    }

    function onExamChange() {
        const date = document.getElementById('dateSelect').value; const inst = document.getElementById('instSelect').value; const exam = document.getElementById('examSelect').value; resetSelects(['levelSelect', 'studentSelect']);
        if (!exam || !reportsDB[date][inst][exam]) return;
        const select = document.getElementById('levelSelect'); select.disabled = false;
        Object.keys(reportsDB[date][inst][exam]).sort().forEach(lvl => {
            let option = document.createElement('option'); option.value = lvl; option.textContent = lvl; select.appendChild(option);
        });
    }

    function onLevelChange() {
        const date = document.getElementById('dateSelect').value; const inst = document.getElementById('instSelect').value; const exam = document.getElementById('examSelect').value; const lvl = document.getElementById('levelSelect').value;
        const inputField = document.getElementById('studentSelect'); const dataList = document.getElementById('studentOptions');
        inputField.value = ""; dataList.innerHTML = ""; inputField.disabled = true; currentLevelStudents = [];
        if (!lvl || !reportsDB[date][inst][exam][lvl]) return;
        inputField.disabled = false; inputField.placeholder = "نام خود را تایپ یا انتخاب کنید...";
        currentLevelStudents = [...reportsDB[date][inst][exam][lvl]];
        currentLevelStudents.sort((a, b) => a.name.localeCompare(b.name, 'fa'));
        currentLevelStudents.forEach(stu => {
            let option = document.createElement('option'); option.value = stu.name; dataList.appendChild(option);
        });
    }

    function resetSelects(ids) {
        ids.forEach(id => {
            const select = document.getElementById(id); let txt = "انتخاب کنید...";
            if (id === 'instSelect') txt = "تاریخ را انتخاب کنید";
            else if (id === 'examSelect') txt = "موسسه را انتخاب کنید";
            else if (id === 'levelSelect') txt = "آزمون را انتخاب کنید";
            if (id === 'studentSelect') {
                select.value = ""; select.placeholder = "سطح را انتخاب کنید"; select.disabled = true;
                document.getElementById('studentOptions').innerHTML = ""; currentLevelStudents = [];
            } else { select.innerHTML = `<option value="">${txt}</option>`; select.disabled = true; }
        });
    }

    function decryptContent(cipherText, password) {
        const binaryStr = atob(cipherText); const u8Arr = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) { u8Arr[i] = binaryStr.charCodeAt(i) ^ password.charCodeAt(i % password.length); }
        return new TextDecoder("utf-8").decode(u8Arr);
    }

    async function verifyAndFetch() {
        const studentName = document.getElementById('studentSelect').value.trim(); const password = document.getElementById('studentPassword').value.trim();
        const frame = document.getElementById('displayFrame'); const container = document.getElementById('mainContainer'); const submitBtn = document.getElementById('submitBtn');
        const progressContainer = document.getElementById('progressBarContainer'); const progressBar = document.getElementById('progressBar'); const progressText = document.getElementById('progressText');

        if (!studentName || !password) { alert("لطفاً نام و رمز عبور را وارد کنید."); return; }
        const targetStudent = currentLevelStudents.find(stu => stu.name === studentName);
        if (!targetStudent) { alert("❌ نام داوطلب یافت نشد."); return; }

        const inputHash = await hashPassword(password);
        if (targetStudent.pwd_hash && targetStudent.pwd_hash !== inputHash) {
            alert("🔒 رمز عبور وارد شده اشتباه است. دسترسی امکان‌پذیر نیست."); return;
        }

        submitBtn.disabled = true; progressContainer.style.display = "block"; progressBar.style.width = "0%"; progressText.textContent = "تایید امضا... ۰%"; frame.style.display = "none";
        const xhr = new XMLHttpRequest(); xhr.open('GET', CLOUD_BASE_URL + targetStudent.file_name, true); xhr.responseType = 'arraybuffer';
        xhr.onprogress = function(e) {
            if (e.lengthComputable) {
                const percent = Math.round((e.loaded / e.total) * 100);
                progressBar.style.width = percent + "%"; progressText.textContent = "در حال دانلود کارنامه... " + percent + "%";
            }
        };
        xhr.onload = async function() {
            submitBtn.disabled = false;
            if (this.status === 200) {
                progressText.textContent = "در حال رندر نهایی...";
                try {
                    const zip = await JSZip.loadAsync(this.response); let indexFile = zip.file("index.html");
                    if (!indexFile) { const files = Object.keys(zip.files); const htmlKey = files.find(f => f.endsWith('index.html')); indexFile = zip.file(htmlKey); }
                    const base64Content = await indexFile.async("string"); const decHtml = decryptContent(base64Content, password);
                    progressContainer.style.display = "none"; container.style.maxWidth = "1000px"; frame.style.display = "block";
                    const doc = frame.contentWindow.document; doc.open(); doc.write(decHtml); doc.close(); frame.scrollIntoView({ behavior: 'smooth' });
                } catch (e) { alert("خطا در پردازش فایل کارنامه."); progressContainer.style.display = "none"; }
            } else { alert("❌ فایل کارنامه روی سرور یافت نشد."); progressContainer.style.display = "none"; }
        };
        xhr.send();
    }
    window.onload = initSystem;
</script>
</body>
</html>
